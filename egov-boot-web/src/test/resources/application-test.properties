server.port=0

spring.main.allow-bean-definition-overriding=true

spring.datasource.url=jdbc:h2:mem:complaint-test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.ai.provider=openai
app.jobs.execution-mode=embedded
app.worker.service-token=test-worker-service-token-at-least-32-characters
app.worker.lease-seconds=300
app.worker.retry-base-seconds=1
app.worker.retry-max-seconds=2
app.aws.s3.enabled=false
app.rag.provider=postgres
app.rag.opensearch.enabled=false
app.rag.opensearch.endpoint=
app.rag.opensearch.region=ap-northeast-2
app.rag.opensearch.index-prefix=civil-complaint-knowledge
app.rag.opensearch.result-size=10
app.rag.opensearch.vector-k=20
app.rag.opensearch.vector-field=embedding
app.rag.opensearch.neural-model-id=test-neural-model
app.rag.opensearch.search-pipeline=test-hybrid-rerank
app.file-storage.provider=local
app.file-storage.local-dir=target/test-attachments
app.attachment.max-bytes=10485760
app.sensitive-storage.local-dir=target/test-sensitive-payloads
app.sensitive-storage.key=test-only-sensitive-payload-key-at-least-32
app.storage-orphan-cleanup.enabled=false
app.security.session.enabled=false
app.audit.enabled=true
app.seed.demo-enabled=false
app.egov-sample.enabled=false
app.pilot.jurisdiction-code=PILOT
app.external.circuit-breaker.failure-threshold=3
app.external.circuit-breaker.open-duration-ms=60000
app.external.max-cost-units-per-call=2000
