server.port=8081

# Manual beans may override auto-configured beans when eGovFrame runtime beans are used.
spring.main.allow-bean-definition-overriding=true

spring.datasource.url=jdbc:postgresql://localhost:5432/complaintdb
spring.datasource.username=complaint_user
spring.datasource.password=complaint_pass
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# AI provider calls are owned by the restricted Python worker.
app.jobs.execution-mode=python
app.worker.service-token=${WORKER_SERVICE_TOKEN:}
app.worker.lease-seconds=${WORKER_LEASE_SECONDS:300}
app.worker.retry-base-seconds=${WORKER_RETRY_BASE_SECONDS:2}
app.worker.retry-max-seconds=${WORKER_RETRY_MAX_SECONDS:60}
app.aws.region=ap-northeast-2
app.aws.s3.enabled=false
app.aws.s3.bucket=
app.rag.provider=postgres-mock
app.rag.opensearch.enabled=false
app.rag.opensearch.endpoint=
app.rag.opensearch.region=ap-northeast-2
app.rag.opensearch.index-prefix=civil-complaint-knowledge
app.rag.opensearch.result-size=10
app.rag.opensearch.vector-k=20
app.rag.opensearch.vector-field=embedding
app.rag.opensearch.neural-model-id=
app.rag.opensearch.search-pipeline=
app.file-storage.provider=local
app.file-storage.local-dir=target/attachments
app.attachment.max-bytes=10485760
app.sensitive-storage.local-dir=target/sensitive-payloads
app.sensitive-storage.key=${SENSITIVE_DATA_KEY}
app.storage-orphan-cleanup.enabled=true
app.storage-orphan-cleanup.grace-seconds=86400
app.storage-orphan-cleanup.initial-delay-ms=3600000
app.storage-orphan-cleanup.fixed-delay-ms=21600000
app.security.session.enabled=${SESSION_SECURITY_ENABLED:true}
app.security.session.intake-password=${INTAKE_PASSWORD:}
app.security.session.reviewer-password=${REVIEWER_PASSWORD:}
app.security.session.approver-password=${APPROVER_PASSWORD:}
app.security.session.knowledge-admin-password=${KNOWLEDGE_ADMIN_PASSWORD:}
app.security.session.auditor-password=${AUDITOR_PASSWORD:}
app.security.session.admin-password=${ADMIN_PASSWORD:}
app.audit.enabled=true
app.seed.demo-enabled=false
app.egov-sample.enabled=false
app.pilot.jurisdiction-code=PILOT
app.external.circuit-breaker.failure-threshold=3
app.external.circuit-breaker.open-duration-ms=60000
app.external.max-cost-units-per-call=2000
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
