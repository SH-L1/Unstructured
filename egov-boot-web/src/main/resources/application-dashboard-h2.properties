server.port=8081

spring.datasource.url=jdbc:h2:mem:complaint-dashboard;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

app.jobs.execution-mode=python
app.worker.service-token=dashboard-worker-service-token-at-least-32-characters
app.worker.lease-seconds=300
app.worker.retry-base-seconds=1
app.worker.retry-max-seconds=2
app.aws.s3.enabled=false
app.rag.provider=postgres-mock
app.rag.opensearch.enabled=false
app.rag.opensearch.endpoint=
app.rag.opensearch.region=ap-northeast-2
app.rag.opensearch.index-prefix=civil-complaint-knowledge
app.rag.opensearch.vector-k=20
app.rag.opensearch.vector-field=embedding
app.rag.opensearch.neural-model-id=dashboard-disabled
app.rag.opensearch.search-pipeline=dashboard-disabled
app.rag.opensearch.result-size=3
app.file-storage.provider=local
app.file-storage.local-dir=target/dashboard-attachments
app.sensitive-storage.local-dir=target/dashboard-sensitive-payloads
app.sensitive-storage.key=dashboard-demo-only-sensitive-payload-key
app.storage-orphan-cleanup.enabled=false
app.security.session.enabled=false
app.audit.enabled=true
app.seed.demo-enabled=true
app.egov-sample.enabled=false
app.external.circuit-breaker.failure-threshold=3
app.external.circuit-breaker.open-duration-ms=60000
app.external.max-cost-units-per-call=2000
