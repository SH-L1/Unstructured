server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# AI provider calls are owned by the restricted Python worker.
app.jobs.execution-mode=python
app.worker.service-token=${WORKER_SERVICE_TOKEN}
app.worker.lease-seconds=${WORKER_LEASE_SECONDS:300}
app.worker.retry-base-seconds=${WORKER_RETRY_BASE_SECONDS:2}
app.worker.retry-max-seconds=${WORKER_RETRY_MAX_SECONDS:60}
app.aws.region=${AWS_REGION:ap-northeast-2}
app.aws.s3.enabled=${AWS_S3_ENABLED:false}
app.aws.s3.bucket=${AWS_S3_BUCKET:}
app.aws.s3.key-prefix=${AWS_S3_KEY_PREFIX:complaints}
app.rag.provider=${RAG_PROVIDER:postgres-mock}
app.rag.opensearch.enabled=${OPENSEARCH_ENABLED:false}
app.rag.opensearch.endpoint=${OPENSEARCH_ENDPOINT:}
app.rag.opensearch.region=${OPENSEARCH_REGION:${AWS_REGION:ap-northeast-2}}
app.rag.opensearch.index-prefix=${OPENSEARCH_INDEX_PREFIX:civil-complaint-knowledge}
app.rag.opensearch.result-size=${OPENSEARCH_RESULT_SIZE:10}
app.rag.opensearch.vector-k=${OPENSEARCH_VECTOR_K:20}
app.rag.opensearch.vector-field=${OPENSEARCH_VECTOR_FIELD:embedding}
app.rag.opensearch.neural-model-id=${OPENSEARCH_NEURAL_MODEL_ID:}
app.rag.opensearch.search-pipeline=${OPENSEARCH_SEARCH_PIPELINE:}
app.file-storage.provider=${FILE_STORAGE_PROVIDER:local}
app.file-storage.local-dir=${FILE_STORAGE_LOCAL_DIR:target/attachments}
app.attachment.max-bytes=${ATTACHMENT_MAX_BYTES:10485760}
app.sensitive-storage.local-dir=${SENSITIVE_STORAGE_LOCAL_DIR:target/sensitive-payloads}
app.sensitive-storage.key=${SENSITIVE_DATA_KEY}
app.storage-orphan-cleanup.enabled=${STORAGE_ORPHAN_CLEANUP_ENABLED:true}
app.storage-orphan-cleanup.grace-seconds=${STORAGE_ORPHAN_GRACE_SECONDS:86400}
app.storage-orphan-cleanup.initial-delay-ms=${STORAGE_ORPHAN_INITIAL_DELAY_MS:3600000}
app.storage-orphan-cleanup.fixed-delay-ms=${STORAGE_ORPHAN_FIXED_DELAY_MS:21600000}
app.security.session.enabled=true
app.security.session.intake-password=${INTAKE_PASSWORD}
app.security.session.reviewer-password=${REVIEWER_PASSWORD}
app.security.session.approver-password=${APPROVER_PASSWORD}
app.security.session.knowledge-admin-password=${KNOWLEDGE_ADMIN_PASSWORD}
app.security.session.auditor-password=${AUDITOR_PASSWORD}
app.security.session.admin-password=${ADMIN_PASSWORD}
app.audit.enabled=${AUDIT_ENABLED:true}
app.seed.demo-enabled=${DEMO_SEED_ENABLED:false}
app.egov-sample.enabled=false
app.pilot.jurisdiction-code=${PILOT_JURISDICTION_CODE:PILOT}
app.external.circuit-breaker.failure-threshold=${EXTERNAL_FAILURE_THRESHOLD:3}
app.external.circuit-breaker.open-duration-ms=${EXTERNAL_OPEN_DURATION_MS:60000}
app.external.max-cost-units-per-call=${EXTERNAL_MAX_COST_UNITS_PER_CALL:2000}
springdoc.api-docs.enabled=${OPENAPI_ENABLED:false}
springdoc.swagger-ui.enabled=${OPENAPI_ENABLED:false}
