server.port=${SERVER_PORT:8081}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

app.ai.mock-enabled=${AI_MOCK_ENABLED:false}
app.ai.provider=${AI_PROVIDER:openai}
app.openai.api-key=${OPENAI_API_KEY:}
app.openai.model=${OPENAI_MODEL:gpt-4o-mini}
app.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
app.aws.region=${AWS_REGION:ap-northeast-2}
app.aws.s3.enabled=${AWS_S3_ENABLED:false}
app.aws.s3.bucket=${AWS_S3_BUCKET:}
app.aws.s3.key-prefix=${AWS_S3_KEY_PREFIX:complaints}
app.aws.bedrock.enabled=${AWS_BEDROCK_ENABLED:false}
app.aws.bedrock.region=${AWS_BEDROCK_REGION:us-east-1}
app.aws.bedrock.model-id=${AWS_BEDROCK_MODEL_ID:}
app.rag.provider=${RAG_PROVIDER:postgres-mock}
app.rag.opensearch.enabled=${OPENSEARCH_ENABLED:false}
app.rag.opensearch.endpoint=${OPENSEARCH_ENDPOINT:}
app.rag.opensearch.region=${OPENSEARCH_REGION:${AWS_REGION:ap-northeast-2}}
app.rag.opensearch.index-name=${OPENSEARCH_INDEX_NAME:civil-complaint-knowledge}
app.rag.opensearch.result-size=${OPENSEARCH_RESULT_SIZE:3}
app.file-storage.provider=${FILE_STORAGE_PROVIDER:local}
app.file-storage.local-dir=${FILE_STORAGE_LOCAL_DIR:target/attachments}
app.security.api-key.enabled=${API_KEY_ENABLED:true}
app.security.api-key.value=${API_KEY_VALUE}
app.security.bootstrap-admin.username=${API_KEY_ADMIN_USERNAME:admin}
app.audit.enabled=${AUDIT_ENABLED:true}
app.seed.demo-enabled=${DEMO_SEED_ENABLED:false}
